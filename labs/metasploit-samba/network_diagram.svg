<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Lab network diagram</title>
  <desc>Attacker ubuntu-lab at 192.168.64.5 exploiting Metasploitable 2 at 192.168.64.6 over UTM Shared Network.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; fill: #555; }
  </style>

  <!-- Mac host container -->
  <rect x="40" y="30" width="600" height="330" rx="20" fill="#f5f5f0" stroke="#aaa" stroke-width="0.8"/>
  <text class="th" x="340" y="62" text-anchor="middle">Mac host (hadam.if26)</text>
  <text class="ts" x="340" y="80" text-anchor="middle">UTM hypervisor — Shared Network 192.168.64.0/24</text>

  <!-- Attacker VM -->
  <rect x="80" y="120" width="220" height="90" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text class="th" x="190" y="152" text-anchor="middle" fill="#3C3489">ubuntu-lab (attacker)</text>
  <text class="ts" x="190" y="172" text-anchor="middle" fill="#534AB7">192.168.64.5</text>
  <text class="ts" x="190" y="190" text-anchor="middle" fill="#534AB7">Metasploit + nmap</text>

  <!-- Gateway -->
  <rect x="290" y="280" width="100" height="50" rx="8" fill="#f0ede4" stroke="#aaa" stroke-width="0.8"/>
  <text class="th" x="340" y="302" text-anchor="middle">Gateway</text>
  <text class="ts" x="340" y="320" text-anchor="middle">192.168.64.1</text>

  <!-- Target VM -->
  <rect x="380" y="120" width="220" height="90" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="490" y="152" text-anchor="middle" fill="#4A1B0C">Metasploitable 2 (target)</text>
  <text class="ts" x="490" y="172" text-anchor="middle" fill="#993C1D">192.168.64.6</text>
  <text class="ts" x="490" y="190" text-anchor="middle" fill="#993C1D">Samba, FTP, HTTP…</text>

  <!-- Attack arrow -->
  <line x1="300" y1="155" x2="378" y2="155" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="145" text-anchor="middle">exploit</text>

  <!-- Reverse shell arrow -->
  <line x1="378" y1="175" x2="300" y2="175" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="200" text-anchor="middle">bind shell</text>

  <!-- Gateway lines -->
  <line x1="190" y1="210" x2="280" y2="282" stroke="#aaa" stroke-width="0.5"/>
  <line x1="490" y1="210" x2="400" y2="282" stroke="#aaa" stroke-width="0.5"/>
</svg>
